<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f6f9;
        }

        h1 {
            margin-top: 40px;
        }

        .menu-container {
            margin-top: 40px;
        }

        .menu-button {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        .menu-button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <h1>MATH APPLICATION MENU</h1>
    <div class="menu-container">
        <a th:href="@{/palindrome}" class="menu-button">Palindrome</a>
        <a th:href="@{/even}" class="menu-button">Even Number</a>
        <a th:href="@{/square}" class="menu-button">Square</a>
        <a th:href="@{/calculator}" class="menu-button">Calculator</a>
        <a th:href="@{/factorial}" class="menu-button">Factorial Calculator</a>
    </div>
</body>
</html>
