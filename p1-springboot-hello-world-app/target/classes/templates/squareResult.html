<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:replace="fragments :: menu"></div>

    <h2>Square result</h2>

    <p th:text="${result
                    ? 'Yes, ' + squareData.num2 + ' is the square of ' + squareData.num1
                    : 'No, ' + squareData.num2 + ' is not the square of ' + squareData.num1}"></p>

    <a th:href="@{/square}">Try again</a>
</body>
</html>
